<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - GR社用車管理システム</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <i class="bi bi-car-front-fill login-icon"></i>
        <h1>GR社用車管理システム</h1>
        <p class="text-muted">グローバルリゾート</p>
      </div>

      <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>

      <form id="loginForm">
        <div class="mb-3">
          <label for="employee_id" class="form-label">
            <i class="bi bi-person-badge"></i> 社員番号
          </label>
          <input type="text" class="form-control form-control-lg" id="employee_id"
                 placeholder="社員番号を入力" required autofocus>
        </div>
        <div class="mb-4">
          <label for="password" class="form-label">
            <i class="bi bi-lock"></i> パスワード
          </label>
          <input type="password" class="form-control form-control-lg" id="password"
                 placeholder="パスワードを入力" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100" id="loginBtn">
          <i class="bi bi-box-arrow-in-right"></i> ログイン
        </button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorAlert = document.getElementById('errorAlert');
      errorAlert.classList.add('d-none');

      const employee_id = document.getElementById('employee_id').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> ログイン中...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ employee_id, password })
        });

        const data = await res.json();

        if (res.ok) {
          window.location.href = '/';
        } else {
          errorAlert.textContent = data.error;
          errorAlert.classList.remove('d-none');
        }
      } catch (err) {
        errorAlert.textContent = 'サーバーに接続できません';
        errorAlert.classList.remove('d-none');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> ログイン';
      }
    });
  </script>
</body>
</html>
