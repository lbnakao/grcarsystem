<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GR社用車管理システム</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <!-- サイドバー -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <h2><i class="bi bi-car-front-fill"></i> <span id="brandName">GR社用車管理</span></h2>
        <small>グローバルリゾート</small>
        <div style="font-size:9px;color:#64748b;margin-top:4px;">supported by (株)リベルブライト</div>
      </div>
      <ul class="sidebar-nav">
        <li><a href="#" id="navCalendar" class="active" onclick="showCalendar(); return false;"><i class="bi bi-calendar3"></i> 予約カレンダー</a></li>
        <li><a href="#" onclick="showCarStatus(); return false;"><i class="bi bi-geo-alt"></i> 車両ステータス</a></li>
        <li id="navOperationLog" class="d-none"><a href="#" onclick="showOperationLog(); return false;"><i class="bi bi-journal-text"></i> 運行記録簿</a></li>
        <li id="adminLink" class="d-none"><a href="/admin"><i class="bi bi-gear"></i> 管理ページ</a></li>
        <li><a href="/manual.html" target="_blank" id="manualLink"><i class="bi bi-book"></i> 操作説明書</a></li>
      </ul>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar"></div>
          <div>
            <div class="user-name" id="userName"></div>
            <div class="user-role" id="userRole"></div>
          </div>
        </div>
        <button class="btn btn-outline-light btn-sm w-100 mb-2" onclick="openPasswordModal()">
          <i class="bi bi-key"></i> パスワード変更
        </button>
        <button class="btn btn-outline-light btn-sm w-100" onclick="logout()">
          <i class="bi bi-box-arrow-left"></i> ログアウト
        </button>
      </div>
    </nav>

    <!-- メインコンテンツ -->
    <main class="main-content">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">
        <i class="bi bi-gear-fill"></i>
      </button>

      <!-- グループタブ（管理者は両方、一般は自グループのみ） -->
      <div class="group-tabs" id="groupTabs"></div>

      <!-- カレンダービュー -->
      <div id="calendarView">
        <div class="page-header">
          <h1><i class="bi bi-calendar3"></i> <span id="pageTitleText">予約カレンダー</span></h1>
          <div class="d-flex gap-2">
            <a href="/manual.html" target="_blank" class="btn btn-danger btn-sm" id="manualLinkHeader">
              <i class="bi bi-book"></i> 操作説明書
            </a>
            <button class="btn btn-primary btn-sm" onclick="openNewReservation()">
              <i class="bi bi-plus-lg"></i> 新規予約
            </button>
          </div>
        </div>

        <!-- 車両ステータスカード（簡易表示） -->
        <div class="car-status-grid" id="carStatusGrid"></div>

        <!-- カレンダー -->
        <div id="calendar"></div>
      </div>

      <!-- 車両ステータスビュー -->
      <div id="carStatusView" class="d-none">
        <div class="page-header">
          <h1><i class="bi bi-geo-alt"></i> 車両ステータス</h1>
          <button class="btn btn-outline-secondary btn-sm" onclick="showCalendar()">
            <i class="bi bi-arrow-left"></i> カレンダーに戻る
          </button>
        </div>
        <div class="car-status-grid" id="carStatusDetail"></div>
      </div>

      <!-- 運行記録簿ビュー（安芸太田町組のみ） -->
      <div id="operationLogView" class="d-none">
        <div class="page-header">
          <h1><i class="bi bi-journal-text"></i> 運行記録簿</h1>
          <button class="btn btn-outline-secondary btn-sm" onclick="showCalendar()">
            <i class="bi bi-arrow-left"></i> カレンダーに戻る
          </button>
        </div>

        <div class="card mb-3">
          <div class="card-body">
            <div class="row g-2 align-items-end">
              <div class="col-md-5">
                <label class="form-label mb-1" style="font-size:13px;">車両</label>
                <select class="form-select" id="logCarSelect"></select>
              </div>
              <div class="col-md-3">
                <label class="form-label mb-1" style="font-size:13px;">年</label>
                <select class="form-select" id="logYearSelect"></select>
              </div>
              <div class="col-md-2">
                <label class="form-label mb-1" style="form-size:13px;">月</label>
                <select class="form-select" id="logMonthSelect"></select>
              </div>
              <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="loadOperationLog()">
                  <i class="bi bi-search"></i> 表示
                </button>
              </div>
            </div>
          </div>
        </div>

        <div id="operationLogContent"></div>
      </div>
    </main>
  </div>

  <!-- 新規予約モーダル -->
  <div class="modal fade" id="reservationModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="reservationModalTitle">
            <i class="bi bi-plus-circle"></i> 新規予約
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <!-- 警告表示エリア -->
          <div id="resWarnings"></div>

          <form id="reservationForm">
            <input type="hidden" id="reservationId">
            <div class="mb-3">
              <label class="form-label">車両 <span class="text-danger">*</span></label>
              <select class="form-select" id="resCarId" required>
                <option value="">選択してください</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">開始 <span class="text-danger">*</span></label>
              <div class="row g-2">
                <div class="col-7"><input type="date" class="form-control" id="resStartDate" required></div>
                <div class="col-5"><input type="time" class="form-control" id="resStartTime" required></div>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">終了 <span class="text-danger">*</span></label>
              <div class="row g-2">
                <div class="col-7"><input type="date" class="form-control" id="resEndDate" required></div>
                <div class="col-5"><input type="time" class="form-control" id="resEndTime" required></div>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">出発場所 <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="resDeparture" placeholder="例: 弥山" required>
            </div>
            <div class="mb-3">
              <label class="form-label">返却場所 <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="resReturn" placeholder="例: 弥山" required>
            </div>
            <div class="mb-3">
              <label class="form-label">備考</label>
              <textarea class="form-control" id="resNotes" rows="2" placeholder="任意"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
          <button type="button" class="btn btn-primary" id="saveResBtn" onclick="saveReservation()">
            <i class="bi bi-check-lg"></i> 保存
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 警告確認モーダル -->
  <div class="modal fade" id="warningConfirmModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-danger text-white" style="border-radius:12px 12px 0 0;">
          <h5 class="modal-title"><i class="bi bi-exclamation-triangle-fill"></i> 予約内容の確認</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="warningConfirmBody"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">戻る</button>
          <button type="button" class="btn btn-danger" id="warningConfirmBtn">
            <i class="bi bi-check-lg"></i> このまま予約を確定
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 予約詳細モーダル -->
  <div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-info-circle"></i> 予約詳細</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="detailBody"></div>
        <div class="modal-footer" id="detailFooter"></div>
      </div>
    </div>
  </div>

  <!-- 完了モーダル（安芸太田町組用） -->
  <div class="modal fade" id="completeModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-success text-white" style="border-radius:12px 12px 0 0;">
          <h5 class="modal-title"><i class="bi bi-check-circle-fill"></i> 使用完了</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="completeForm">
            <input type="hidden" id="completeResId">
            <div class="alert alert-info py-2 px-3" style="font-size:13px;">
              <i class="bi bi-info-circle"></i> 帰着時間は「完了」ボタン押下時刻で自動記録されます。
            </div>
            <div class="mb-3">
              <label class="form-label">出庫時 積算距離 (km) <span class="text-muted">※前回帰着値を引用</span></label>
              <input type="number" step="0.1" class="form-control" id="completeStartOdo">
            </div>
            <div class="mb-3">
              <label class="form-label">帰着時 積算距離 (km) <span class="text-danger">*</span></label>
              <input type="number" step="0.1" class="form-control" id="completeEndOdo" required>
            </div>
            <div class="mb-3">
              <label class="form-label">使用距離 (km)</label>
              <input type="text" class="form-control" id="completeDistance" readonly style="background:#f1f5f9;">
            </div>
            <div class="mb-3">
              <label class="form-label">行先・使用目的 <span class="text-danger">*</span></label>
              <textarea class="form-control" id="completePurpose" rows="2" placeholder="例: 温井→広島市 資材運搬" required></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
          <button type="button" class="btn btn-success" onclick="submitComplete()">
            <i class="bi bi-check-lg"></i> 完了を確定
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 完了リマインダーモーダル（安芸太田ログイン時） -->
  <div class="modal fade" id="completionPromptModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header" id="completionPromptHeader">
          <h5 class="modal-title" id="completionPromptTitle"></h5>
        </div>
        <div class="modal-body" id="completionPromptBody"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="completionPromptNotYet">
            完了していない
          </button>
          <button type="button" class="btn btn-success" id="completionPromptDone">
            <i class="bi bi-check-lg"></i> 完了
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- パスワード変更モーダル -->
  <div class="modal fade" id="passwordModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-key"></i> パスワード変更</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="passwordForm">
            <div class="mb-3">
              <label class="form-label">現在のパスワード <span class="text-danger">*</span></label>
              <input type="password" class="form-control" id="currentPassword" required>
            </div>
            <div class="mb-3">
              <label class="form-label">新しいパスワード <span class="text-danger">*</span></label>
              <input type="password" class="form-control" id="newPassword" placeholder="4文字以上" required>
            </div>
            <div class="mb-3">
              <label class="form-label">新しいパスワード（確認） <span class="text-danger">*</span></label>
              <input type="password" class="form-control" id="confirmPassword" required>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
          <button type="button" class="btn btn-primary" onclick="changePassword()">
            <i class="bi bi-check-lg"></i> 変更
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
